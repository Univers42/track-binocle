# File: docker/services/waf/conf/crs-setup.conf
# OWASP Core Rule Set v4 — tuning overrides for mini-BaaS
#
# This SUPPLEMENTS the default crs-setup.conf from the container image.
# Only settings that differ from defaults need to appear here.

# ── Paranoia Level ─────────────────────────────────────────────────
# Level 1: minimal FP, catches obvious attacks
# Level 2: moderate FP, catches most OWASP Top 10
# Level 3: many FP, aggressive (production with extensive tuning)
# Level 4: extreme FP, research grade
#
# We use Level 2 for a good security/usability balance.
SecAction \
    "id:900000,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:tx.blocking_paranoia_level=2"

# ── Anomaly scoring thresholds ─────────────────────────────────────
# Inbound: block if anomaly score >= 5 (default for PL2)
# Outbound: block if anomaly score >= 4
SecAction \
    "id:900110,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:tx.inbound_anomaly_score_threshold=5,\
     setvar:tx.outbound_anomaly_score_threshold=4"

# ── Allowed HTTP methods ───────────────────────────────────────────
SecAction \
    "id:900200,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# ── Allowed request content types ──────────────────────────────────
SecAction \
    "id:900220,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |multipart/related| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/cloudevents+json| |application/cloudevents-batch+json| |application/grpc| |application/octet-stream|'"

# ── Allowed HTTP versions ─────────────────────────────────────────
SecAction \
    "id:900230,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:'tx.allowed_http_versions=HTTP/1.0 HTTP/1.1 HTTP/2 HTTP/2.0 HTTP/3 HTTP/3.0'"

# ── Maximum argument sizes ─────────────────────────────────────────
SecAction \
    "id:900300,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:tx.max_num_args=512,\
     setvar:tx.arg_name_length=256,\
     setvar:tx.arg_length=4000,\
     setvar:tx.total_arg_length=128000"

# ── Enforce body processor for JSON APIs ───────────────────────────
SecAction \
    "id:900010,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:tx.enforce_bodyproc_urlencoded=1"

# ── Enable sampling for high-traffic endpoints ────────────────────
# 0 = check all, 100 = check every 100th request (off by default)
SecAction \
    "id:900400,\
     phase:1,\
     nolog,\
     pass,\
     t:none,\
     setvar:tx.sampling_percentage=100"
