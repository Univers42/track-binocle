# ============================================
# Transcendence — Production Stack
# ============================================
# Pulls Prismatica images from Docker Hub and adds
# database services. One `docker compose up` runs everything.
# ============================================

services:
  # ── PostgreSQL 16 ────────────────────────────────
  db:
    container_name: transcendence-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transcendence}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transcendence}"]
      interval: 2s
      timeout: 2s
      retries: 15

  # ── MongoDB 7 ────────────────────────────────────
  mongo:
    container_name: transcendence-mongo
    image: mongo:7-jammy
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 2s
      retries: 15

  # ── Prismatica Data API ─────────────────────────
  data-api:
    container_name: transcendence-api
    image: dlesieur/prismatica-api:latest
    restart: unless-stopped
    ports:
      - "${DATA_API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      DATA_API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-transcendence}:${POSTGRES_PASSWORD:-transcendence}@db:5432/${POSTGRES_DB:-transcendence}
      MONGO_URL: mongodb://mongo:27017/${POSTGRES_DB:-transcendence}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-8080}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 2s
      timeout: 2s
      start_period: 15s
      retries: 15
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy

  # ── Prismatica Frontend ─────────────────────────
  frontend:
    container_name: transcendence-frontend
    image: dlesieur/prismatica-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      data-api:
        condition: service_started

volumes:
  pg_data:
  mongo_data:
