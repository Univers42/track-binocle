host       = "0.0.0.0"
port       = 4000

# Directory that serves static assets via the fallback HTTP handler.
# Override via REALTIME_STATIC_DIR env var.
static_dir = "/app/static"

[auth]
type = "none"            # "none" | "jwt"
# secret   = ""          # Required when type = "jwt" (HMAC-SHA256 key)
# issuer   = ""          # Optional: validate the `iss` JWT claim
# audience = ""          # Optional: validate the `aud` JWT claim

[event_bus]
type     = "inprocess"   # Currently the only backend
capacity = 65536         # Channel capacity (events)

[performance]
send_queue_capacity       = 256    # Per-connection outgoing buffer (messages)
fanout_workers            = 0      # 0 = auto-detect (number of CPU cores)
dispatch_channel_capacity = 65536  # Internal dispatch channel capacity


# Hard caps that protect the filter index against resource exhaustion.
# All values below are the defaults — tune them for your workload.

[engine.limits]
max_patterns                    = 10000      # Unique topic patterns
max_subscriptions_per_pattern   = 100000     # Subs per single topic pattern
max_subscriptions_per_connection = 200       # Subs per WebSocket connection
max_composite_keys              = 2000000    # Total composite index keys
max_fields_per_pattern          = 64         # Indexed fields per pattern
max_total_subscriptions         = 1000000    # Global subscription cap
evaluation_slow_threshold_us    = 5000       # Slow-eval threshold (µs)
circuit_breaker_trip_count      = 50         # Consecutive slow evals to trip
circuit_breaker_cooldown_ms     = 5000       # Circuit-breaker cooldown (ms)

# Each [[databases]] entry configures one CDC producer.
# The `config.*` keys are adapter-specific and passed through as-is.
#
# Alternatively, use REALTIME_PG_URL / REALTIME_MONGO_URI env vars for
# quick single-database setups (they are additive with file-based config).

# [[databases]]
# adapter                   = "postgresql"
# config.connection_string  = "postgres://user:password@localhost:5432/mydb"
# config.channel            = "realtime_events"
# config.topic_prefix       = "pg"
# config.poll_interval_ms   = 100

# [[databases]]
# adapter                   = "mongodb"
# config.uri                = "mongodb://localhost:27017"
# config.database           = "mydb"
# config.topic_prefix       = "mongo"
# config.full_document      = "updateLookup"
