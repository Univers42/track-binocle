# File: docker-compose.prod.yml
# Production overlay — secrets, resource limits, no dev ports
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  kong:
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
          cpus: '0.10'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  postgres:
    ports: []  # Remove direct access
