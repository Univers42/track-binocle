<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>You are unsubscribed from the Prismatica newsletter</title>
</head>
<body style="margin:0; padding:0; background:#eef2f6; color:#201a17; font-family:Arial, Helvetica, sans-serif;">
	<main style="background:#eef2f6; margin:0; padding:28px 12px;">
		<section style="max-width:640px; margin:0 auto; background:#fffdf8; border:1px solid #d7cec2; border-radius:18px; box-shadow:0 18px 42px rgba(32,26,23,.13); overflow:hidden;">
			<div style="height:8px; background:#6b5c52;"></div>
			<div style="padding:32px 30px 30px 30px;">
				<p style="margin:0 0 10px 0; color:#6b5c52; font-size:13px; font-weight:700; letter-spacing:.09em; text-transform:uppercase;">Prismatica newsletter</p>
				<h1 style="margin:0 0 18px 0; color:#201a17; font-family:Georgia, 'Times New Roman', serif; font-size:34px; line-height:1.08;">You are unsubscribed</h1>
				<p style="margin:0 0 16px 0; font-size:17px; line-height:1.58;">Hello {{.Email}},</p>
				<p style="margin:0; font-size:17px; line-height:1.58;">You will no longer receive the Prismatica newsletter at this address. Account-protection emails, such as password reset or sign-in alerts, may still be sent when needed.</p>
			</div>
			<footer style="padding:20px 30px 28px 30px; border-top:1px solid #d7cec2; background:#f4efe7;">
				<p style="margin:0; font-size:13px; line-height:1.45;"><a href="{{.SiteURL}}/legal/privacy-policy/" style="color:#6b5c52; font-weight:700;">Privacy Policy</a></p>
			</footer>
		</section>
	</main>
</body>
</html>
