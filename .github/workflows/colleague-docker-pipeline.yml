name: Colleague Docker Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: colleague-docker-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  colleague-workflow:
    name: make all with Vault-backed env
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      COMPOSE_BAKE: "true"
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Verify Vault OIDC configuration
        env:
          TRACK_BINOCLE_VAULT_ADDR: ${{ secrets.TRACK_BINOCLE_VAULT_ADDR || vars.TRACK_BINOCLE_VAULT_ADDR }}
          TRACK_BINOCLE_VAULT_AUTH_PATH: ${{ vars.TRACK_BINOCLE_VAULT_AUTH_PATH || 'jwt' }}
          TRACK_BINOCLE_VAULT_ROLE: ${{ vars.TRACK_BINOCLE_VAULT_ROLE || 'track-binocle-github-actions' }}
        run: |
          set -euo pipefail
          if [ -z "${TRACK_BINOCLE_VAULT_ADDR}" ]; then
            echo "TRACK_BINOCLE_VAULT_ADDR must be set as a GitHub secret or variable."
            echo "Use a public HTTPS Vault URL reachable by GitHub-hosted runners."
            exit 1
          fi
          if [ -z "${TRACK_BINOCLE_VAULT_AUTH_PATH}" ] || [ -z "${TRACK_BINOCLE_VAULT_ROLE}" ]; then
            echo "TRACK_BINOCLE_VAULT_AUTH_PATH and TRACK_BINOCLE_VAULT_ROLE must be set."
            exit 1
          fi

      - name: Login to Vault with GitHub OIDC
        env:
          TRACK_BINOCLE_VAULT_ADDR: ${{ secrets.TRACK_BINOCLE_VAULT_ADDR || vars.TRACK_BINOCLE_VAULT_ADDR }}
          TRACK_BINOCLE_VAULT_AUTH_PATH: ${{ vars.TRACK_BINOCLE_VAULT_AUTH_PATH || 'jwt' }}
          TRACK_BINOCLE_VAULT_ROLE: ${{ vars.TRACK_BINOCLE_VAULT_ROLE || 'track-binocle-github-actions' }}
          TRACK_BINOCLE_VAULT_ENV_PREFIX: ${{ vars.TRACK_BINOCLE_VAULT_ENV_PREFIX || 'secret/data/track-binocle/env' }}
        run: |
          set -euo pipefail
          audience="vault://track-binocle"
          oidc_response=$(curl -fsS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}")
          oidc_token=$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync(0, 'utf8')); if (!payload.value) process.exit(1); process.stdout.write(payload.value);" <<<"${oidc_response}")
          login_payload=$(OIDC_TOKEN="${oidc_token}" node -e "console.log(JSON.stringify({ role: process.env.TRACK_BINOCLE_VAULT_ROLE, jwt: process.env.OIDC_TOKEN }))")
          vault_response=$(curl -fsS -H 'Content-Type: application/json' --data "${login_payload}" "${TRACK_BINOCLE_VAULT_ADDR%/}/v1/auth/${TRACK_BINOCLE_VAULT_AUTH_PATH}/login")
          vault_token=$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync(0, 'utf8')); const token=payload.auth && payload.auth.client_token; if (!token) process.exit(1); process.stdout.write(token);" <<<"${vault_response}")
          echo "::add-mask::${vault_token}"
          mkdir -p .vault
          chmod 700 .vault
          {
            echo '# Generated by GitHub Actions. Do not commit.'
            printf 'VAULT_ADDR=%s\n' "${TRACK_BINOCLE_VAULT_ADDR}"
            printf 'VAULT_TOKEN=%s\n' "${vault_token}"
            printf 'VAULT_ENV_PREFIX=%s\n' "${TRACK_BINOCLE_VAULT_ENV_PREFIX}"
          } > .vault/track-binocle-reader.env
          chmod 600 .vault/track-binocle-reader.env

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Login to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Run the colleague Docker workflow
        run: make all

      - name: Verify secret drift checks
        run: make vault-status db-password-check

      - name: Dump service logs on failure
        if: failure()
        run: |
          docker compose ps -a || true
          docker compose logs --tail=160 || true

      - name: Clean Docker state
        if: always()
        run: docker compose --profile secrets --profile testing down -v --remove-orphans || true
