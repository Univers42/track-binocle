# mini-baas-infra runtime configuration for track-binocle.
#
# This TOML file is copied into the wrapper image at:
#   /etc/mini-baas/mini-baas-infra.conf
# The wrapper Dockerfile also sets:
#   MINI_BAAS_CONFIG_FILE=/etc/mini-baas/mini-baas-infra.conf
#
# Runtime options:
# - Baked image config: build infrastructure/baas/Dockerfile and run it as-is.
# - Volume override: mount a replacement file to /etc/mini-baas/mini-baas-infra.conf.
# - Environment override: set MINI_BAAS_CONFIG_FILE to another path if the base
#   image supports reading a custom config path.
#
# The active profile drives service enablement. Each profile maps to environment
# variables consumed by the BaaS image/entrypoint, for example:
#   api_port    -> KONG_HTTP_PORT / API_PORT
#   auth_port   -> GOTRUE_PORT / AUTH_PORT
#   db_port     -> PG_PORT / POSTGRES_PORT
#   studio_port -> STUDIO_PORT
#   services.*.enabled -> MINI_BAAS_SERVICE_<SERVICE>=true|false

active_profile = "minimal"

[defaults]
api_port = 8000
auth_port = 9999
db_port = 5432
rest_port = 3000
realtime_port = 4000
storage_port = 9000
functions_port = 54321
studio_port = 3001
base_url = "http://localhost:8000"

[cors]
enabled = true
origins = ["http://localhost:4322", "https://localhost:4322", "http://localhost:4321", "https://localhost:4321", "http://localhost:5173", "https://localhost:5173", "http://localhost:3000", "http://localhost:3001", "http://localhost:3100"]
methods = ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
headers = ["Authorization", "apikey", "Content-Type", "X-Client-Info", "X-Supabase-Api-Version"]
credentials = true
max_age = 3600

[smtp]
enabled = true
host = "${SMTP_HOST}"
port = ${SMTP_PORT}
encryption = "${SMTP_ENCRYPTION}"
username = "${SMTP_USERNAME}"
# Password is injected at runtime only through GOTRUE_SMTP_PASS / SMTP_PASSWORD.
# For production Docker secrets, use:
# password_secret_path = "/run/secrets/smtp_password"
from_name = "${SMTP_FROM_NAME}"
from_address = "${SMTP_FROM_ADDRESS}"

[smtp.templates]
confirmation = "/etc/gotrue/templates/email-verification.html"
recovery = "/etc/gotrue/templates/password-reset.html"

[profiles.minimal]
description = "Auth plus database REST for track-binocle local development."
api_port = 8000
auth_port = 9999
db_port = 5432
rest_port = 3000
studio_port = 3001

[profiles.minimal.services.auth]
enabled = true

[profiles.minimal.services.rest]
enabled = true

[profiles.minimal.services.realtime]
enabled = false

[profiles.minimal.services.storage]
enabled = false

[profiles.minimal.services.functions]
enabled = false

[profiles.minimal.services.studio]
enabled = false

[profiles.full]
description = "Full Supabase-compatible BaaS stack."
api_port = 8000
auth_port = 9999
db_port = 5432
rest_port = 3000
realtime_port = 4000
storage_port = 9000
functions_port = 54321
studio_port = 3001

[profiles.full.services.auth]
enabled = true

[profiles.full.services.rest]
enabled = true

[profiles.full.services.realtime]
enabled = true

[profiles.full.services.storage]
enabled = true

[profiles.full.services.functions]
enabled = true

[profiles.full.services.studio]
enabled = true

[profiles.auth-only]
description = "Only the auth gateway and backing database."
api_port = 8000
auth_port = 9999
db_port = 5432
studio_port = 3001

[profiles.auth-only.services.auth]
enabled = true

[profiles.auth-only.services.rest]
enabled = false

[profiles.auth-only.services.realtime]
enabled = false

[profiles.auth-only.services.storage]
enabled = false

[profiles.auth-only.services.functions]
enabled = false

[profiles.auth-only.services.studio]
enabled = false
