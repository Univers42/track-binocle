# File: docker/services/kong/conf/kong.yml
# Kong Declarative Configuration — mini-BaaS Gateway
# Env vars are substituted at runtime via sed in the Kong entrypoint
_format_version: "3.0"
_transform: true

# ─── Consumers ────────────────────────────────────────────────────
consumers:
  - username: anon
    keyauth_credentials:
      - key: __KONG_PUBLIC_API_KEY__
  - username: service_role
    keyauth_credentials:
      - key: __KONG_SERVICE_API_KEY__
  # JWT consumer — matches GoTrue-issued tokens via the "iss" claim.
  # GoTrue sets iss = API_EXTERNAL_URL (default: http://localhost:8000/auth/v1)
  - username: authenticated
    jwt_secrets:
      - key: __GOTRUE_JWT_ISS__
        secret: __JWT_SECRET__
        algorithm: HS256
      - key: supabase
        secret: __JWT_SECRET__
        algorithm: HS256

# ─── Global Plugins ──────────────────────────────────────────────
plugins:
  - name: cors
    config:
      origins:
        - __KONG_CORS_ORIGIN_APP__
        - __KONG_CORS_ORIGIN_PLAYGROUND__
        - __KONG_CORS_ORIGIN_STUDIO__
        - __KONG_CORS_ORIGIN_FRONTEND__
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers:
        [Authorization, Content-Type, Content-Profile, apikey, x-client-info,
         X-Request-ID, Prefer, Range, Accept, Accept-Profile,
         x-supabase-api-version]
      exposed_headers:
        [X-Kong-Upstream-Latency, X-Kong-Proxy-Latency, X-Request-ID]
      credentials: true
      max_age: 3600

  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true

  - name: response-transformer
    config:
      add:
        headers:
          - Strict-Transport-Security:max-age=31536000; includeSubDomains
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - Referrer-Policy:strict-origin-when-cross-origin

  # ── Prometheus metrics (replaces per-service prom-client) ───────
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
      per_consumer: true

  # ── Pre-Function: decode verified JWT and forward claims as headers ──
  # Kong's JWT plugin already verified the signature; we just base64-decode
  # the payload and set trusted headers so upstreams can read user identity
  # without importing jsonwebtoken themselves.
  - name: pre-function
    config:
      access:
        - |
          local auth = kong.request.get_header("authorization")
          if not auth then return end
          local token = auth:match("^[Bb]earer%s+(.+)$")
          if not token then return end
          local parts = {}
          for p in token:gmatch("[^%.]+") do parts[#parts + 1] = p end
          if #parts < 2 then return end
          -- base64url decode the payload
          local b64 = parts[2]:gsub("-", "+"):gsub("_", "/")
          local pad = 4 - #b64 % 4
          if pad < 4 then b64 = b64 .. ("="):rep(pad) end
          local ok, payload = pcall(ngx.decode_base64, b64)
          if not ok or not payload then return end
          local cjson = require("cjson.safe")
          local claims, err = cjson.decode(payload)
          if not claims then return end
          if claims.sub then
            kong.service.request.set_header("X-User-Id", claims.sub)
          end
          if claims.email then
            kong.service.request.set_header("X-User-Email", claims.email)
          end
          if claims.role then
            kong.service.request.set_header("X-User-Role", claims.role)
          end

# ─── Services & Routes ───────────────────────────────────────────
services:
  # Note: The auth service (GoTrue) does NOT get the jwt plugin — it
  # issues JWTs; clients hit it to log in before they have a token.
  - name: auth
    url: http://gotrue:9999
    routes:
      - name: auth-routes
        paths: [/auth/v1]
        strip_path: true
        plugins:
          - name: key-auth
            config:
              key_names: [apikey]
              hide_credentials: false
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              minute: 300
              hour: 5000

  - name: rest
    url: http://postgrest:3000
    routes:
      - name: rest-routes
        paths: [/rest/v1]
        strip_path: true
        plugins:
          - name: key-auth
            config:
              key_names: [apikey]
              hide_credentials: false
          - name: jwt
            config:
              header_names: [authorization]
              key_claim_name: iss
              claims_to_verify: [exp]
              run_on_preflight: false
              anonymous: __KONG_ANON_UUID__
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              minute: 180
              hour: 5000

  # Realtime — custom WebSocket CDC server.
  # The upstream exposes / (dashboard) and /ws (WebSocket endpoint).
  # The API route maps /realtime/v1 → upstream /ws.
  - name: realtime
    url: http://realtime:4000/ws
    routes:
      - name: realtime-api
        paths: [/realtime/v1]
        strip_path: true
        protocols: [http, https]
        plugins:
          - name: key-auth
            config:
              key_names: [apikey]
              hide_credentials: false
          - name: jwt
