name: Colleague Docker Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: colleague-docker-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  colleague-workflow:
    name: make all with Vault-backed env
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      COMPOSE_BAKE: "true"
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Verify Vault CI secrets are configured
        env:
          TRACK_BINOCLE_VAULT_ADDR: ${{ secrets.TRACK_BINOCLE_VAULT_ADDR }}
          TRACK_BINOCLE_VAULT_TOKEN: ${{ secrets.TRACK_BINOCLE_VAULT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TRACK_BINOCLE_VAULT_ADDR}" ] || [ -z "${TRACK_BINOCLE_VAULT_TOKEN}" ]; then
            echo "TRACK_BINOCLE_VAULT_ADDR and TRACK_BINOCLE_VAULT_TOKEN GitHub secrets are required for the colleague pipeline."
            echo "Use a short-lived Vault reader token that can read secret/data/track-binocle/env/*."
            exit 1
          fi

      - name: Materialize Vault reader token file
        env:
          TRACK_BINOCLE_VAULT_ADDR: ${{ secrets.TRACK_BINOCLE_VAULT_ADDR }}
          TRACK_BINOCLE_VAULT_TOKEN: ${{ secrets.TRACK_BINOCLE_VAULT_TOKEN }}
          TRACK_BINOCLE_VAULT_ENV_PREFIX: ${{ secrets.TRACK_BINOCLE_VAULT_ENV_PREFIX }}
        run: |
          set -euo pipefail
          mkdir -p .vault
          chmod 700 .vault
          {
            echo '# Generated by GitHub Actions. Do not commit.'
            printf 'VAULT_ADDR=%s\n' "${TRACK_BINOCLE_VAULT_ADDR}"
            printf 'VAULT_TOKEN=%s\n' "${TRACK_BINOCLE_VAULT_TOKEN}"
            printf 'VAULT_ENV_PREFIX=%s\n' "${TRACK_BINOCLE_VAULT_ENV_PREFIX:-secret/data/track-binocle/env}"
          } > .vault/track-binocle-reader.env
          chmod 600 .vault/track-binocle-reader.env

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run the colleague Docker workflow
        run: make all

      - name: Verify secret drift checks
        run: make vault-status db-password-check

      - name: Dump service logs on failure
        if: failure()
        run: |
          docker compose ps -a || true
          docker compose logs --tail=160 || true

      - name: Clean Docker state
        if: always()
        run: docker compose --profile secrets --profile testing down -v --remove-orphans
