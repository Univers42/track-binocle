              header_names: [authorization]
              key_claim_name: iss
              claims_to_verify: [exp]
              run_on_preflight: false
              anonymous: __KONG_ANON_UUID__
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              minute: 120
              hour: 3000

  # Realtime WebSocket — separate service so it can skip auth plugins.
  # WS auth happens in-band inside the WebSocket protocol.
  - name: realtime-ws
    url: http://realtime:4000/ws
    routes:
      - name: realtime-ws-route
        paths: [/realtime/v1/ws]
        strip_path: true
        protocols: [http, https]

