name: track-binocle

services:
  vault:
    build:
      context: ./apps/baas/mini-baas-infra/docker/services/vault
      dockerfile: Dockerfile
    profiles:
      - secrets
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    environment:
      SKIP_SETCAP: "1"
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: ${VAULT_API_ADDR:-https://localhost:8200}
    expose:
      - "8200"
    volumes:
      - track-binocle-vault-data:/vault/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>/dev/null | grep -q 'Sealed.*false' || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10

  vault-init:
    build:
      context: ./apps/baas/mini-baas-infra/docker/services/vault
      dockerfile: Dockerfile
    profiles:
      - secrets
    env_file:
      - ./apps/baas/.env.local
      - ./.env.local
      - ./apps/opposite-osiris/.env.local
      - ./apps/osionos/app/.env
    environment:
      VAULT_ADDR: http://vault:8200
    entrypoint: /vault/scripts/init-vault.sh
    volumes:
      - track-binocle-vault-data:/vault/data
    depends_on:
      vault:
        condition: service_started
    restart: "no"

  vault-env:
    image: node:22-alpine
    profiles:
      - secrets
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
      VAULT_ADDR: http://vault:8200
      VAULT_KEYS_FILE: /vault/data/.vault-keys.json
      VAULT_ENV_PREFIX: secret/data/track-binocle/env
      NODE_EXTRA_CA_CERTS: /workspace/apps/baas/certs/track-binocle-local-ca.pem
    volumes:
      - ./:/workspace
      - track-binocle-vault-data:/vault/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "apps/baas/scripts/vault-env.mjs", "fetch"]
    depends_on:
      vault-init:
        condition: service_completed_successfully
    restart: "no"

  local-https-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infrastructure/tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/baas/certs:/etc/track-binocle/certs:ro
    ports:
      - "127.0.0.1:${OPPOSITE_OSIRIS_HOST_PORT:-4322}:4322"
      - "127.0.0.1:${OSIONOS_APP_HOST_PORT:-3001}:3001"
      - "127.0.0.1:${OSIONOS_BRIDGE_HOST_PORT:-4000}:4000"
      - "127.0.0.1:${AUTH_GATEWAY_HOST_PORT:-8787}:8787"
      - "127.0.0.1:${KONG_HTTP_PORT:-8000}:8000"
      - "127.0.0.1:${KONG_ADMIN_PORT:-8001}:8001"
      - "127.0.0.1:${MAIL_HOST_PORT:-3002}:3002"
      - "127.0.0.1:${MAIL_BRIDGE_PORT:-4100}:4100"
      - "127.0.0.1:${CALENDAR_HOST_PORT:-3003}:3003"
      - "127.0.0.1:${CALENDAR_BRIDGE_PORT:-4200}:4200"
      - "127.0.0.1:${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 6
    restart: unless-stopped

  postgres:
    image: ${BAAS_POSTGRES_IMAGE:-track-binocle-postgres:local}
    build:
      context: ./apps/baas/mini-baas-infra/docker/services/postgres
    env_file:
      - ./apps/baas/.env.local
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - track-binocle-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  db-bootstrap:
    image: postgres:16-alpine
    env_file:
      - ./apps/baas/.env.local
    environment:
      REALTIME_DB_NAME: ${REALTIME_DB_NAME:-realtime}
    command: >
      sh -ec '
        export PGPASSWORD="$${POSTGRES_PASSWORD:-postgres}";
        until pg_isready -h postgres -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-postgres}"; do sleep 1; done;
        psql -h postgres -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-postgres}" -v ON_ERROR_STOP=1 -v pwd="$${POSTGRES_PASSWORD:-postgres}" -v realtime_db="$${REALTIME_DB_NAME:-realtime}" -f /bootstrap/db-bootstrap.sql;
      '
    volumes:
      - ./apps/baas/scripts/db-bootstrap.sql:/bootstrap/db-bootstrap.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  project-db-init:
    image: postgres:16-alpine
    env_file:
      - ./apps/baas/.env.local
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    command: ["sh", "/bootstrap/apply-project-sql.sh"]
    volumes:
      - ./apps/baas/scripts/apply-project-sql.sh:/bootstrap/apply-project-sql.sh:ro
      - ./models/user.sql:/project-init/01-user.sql:ro
      - ./models/gdpr-migration.sql:/project-init/02-gdpr.sql:ro
      - ./models/auth-security-migration.sql:/project-init/03-auth-security.sql:ro
      - ./models/osionos-bridge-migration.sql:/project-init/04-osionos-bridge.sql:ro
      - ./models/calendar-migration.sql:/project-init/05-calendar.sql:ro
      - ./models/seeds.sql:/project-init/06-seeds.sql:ro
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    restart: "no"

  redis:
    image: ${BAAS_REDIS_IMAGE:-redis:7-alpine}
    command: redis-server --appendonly yes
    volumes:
      - track-binocle-redis-data:/data
    restart: unless-stopped

  gotrue:
    image: ${BAAS_GOTRUE_IMAGE:-supabase/gotrue:v2.188.1}
    env_file:
      - ./.env.local
      - ./apps/baas/.env.local
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-https://localhost:8000/auth/v1}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_MIGRATIONS_PATH: ${GOTRUE_DB_MIGRATIONS_PATH:-/usr/local/etc/auth/migrations}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${GOTRUE_EXTERNAL_EMAIL_ENABLED:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-mailpit}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-1025}
      GOTRUE_SMTP_USER: ${SMTP_USERNAME:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASSWORD:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM_ADDRESS:-noreply@mini-baas.local}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_FROM_NAME:-Prismatica}
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: /etc/gotrue/templates/email-verification.html
      GOTRUE_MAILER_TEMPLATES_RECOVERY: /etc/gotrue/templates/password-reset.html
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_ISSUER: ${API_EXTERNAL_URL:-https://localhost:8000/auth/v1}
    volumes:
      - ./apps/opposite-osiris/src/email-templates:/etc/gotrue/templates:ro
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 8

  postgrest:
    image: ${BAAS_POSTGREST_IMAGE:-postgrest/postgrest:v12.2.3}
    env_file:
      - ./apps/baas/.env.local
    environment:
      PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA:-public}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-anon}
      PGRST_SERVER_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      project-db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  pg-meta:
    image: ${BAAS_PG_META_IMAGE:-supabase/postgres-meta:v0.91.0}
    env_file:
      - ./apps/baas/.env.local
    environment:
      PG_META_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      project-db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  supavisor:
    image: ${BAAS_SUPAVISOR_IMAGE:-supabase/supavisor:2.7.4}
    env_file:
      - ./apps/baas/.env.local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kong:
    image: ${BAAS_KONG_IMAGE:-track-binocle/mini-baas-kong:local}
    pull_policy: ${BAAS_KONG_PULL_POLICY:-missing}
    build:
      context: ./apps/baas
      dockerfile: Dockerfile
    env_file:
      - ./.env.local
      - ./apps/baas/.env.local
    expose:
      - "8000"
      - "8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_HEADERS: "off"
      KONG_NGINX_HTTP_CLIENT_MAX_BODY_SIZE: "1m"
      KONG_NGINX_HTTP_CLIENT_BODY_TIMEOUT: "1s"
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_MEM_CACHE_SIZE: "64m"
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: "cjson.safe"
      GOTRUE_JWT_ISS: ${API_EXTERNAL_URL:-https://localhost:8000/auth/v1}
    command:
      - sh
      - -ec
      - |
        sed \
          -e "s|__KONG_PUBLIC_API_KEY__|$${KONG_PUBLIC_API_KEY}|g" \
          -e "s|__KONG_SERVICE_API_KEY__|$${KONG_SERVICE_API_KEY}|g" \
          -e "s|__KONG_CORS_ORIGIN_APP__|$${KONG_CORS_ORIGIN_APP:-https://localhost:3000}|g" \
          -e "s|__KONG_CORS_ORIGIN_PLAYGROUND__|$${KONG_CORS_ORIGIN_PLAYGROUND:-https://localhost:3100}|g" \
          -e "s|__KONG_CORS_ORIGIN_STUDIO__|$${KONG_CORS_ORIGIN_STUDIO:-https://localhost:3001}|g" \
          -e "s|__KONG_CORS_ORIGIN_FRONTEND__|$${KONG_CORS_ORIGIN_FRONTEND:-https://localhost:4322}|g" \
          -e "s|__JWT_SECRET__|$${JWT_SECRET}|g" \
          -e "s|__GOTRUE_JWT_ISS__|$${GOTRUE_JWT_ISS}|g" \
          -e "s|__KONG_ANON_UUID__|$${KONG_ANON_UUID:-cd4f782c-ac87-5081-b322-b54834d15651}|g" \
          /etc/kong/kong.yml.tmpl > /tmp/kong.yml
        exec /docker-entrypoint.sh kong docker-start
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 10
    depends_on:
      gotrue:
        condition: service_healthy
      postgrest:
        condition: service_started
      pg-meta:
        condition: service_started
    restart: unless-stopped

  local-runtime-secrets:
    image: node:22-alpine
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /app
    command: ["node", "apps/baas/scripts/ensure-osionos-runtime-secrets.mjs"]
    volumes:
      - ./:/app
    restart: "no"

  osionos-bridge:
    image: node:22-bookworm-slim
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /app/apps/osionos/app
    command: ["node", "scripts/bridge-api.mjs"]
    env_file:
      - ./.env.local
      - ./apps/baas/.env.local
    environment:
      OSIONOS_BRIDGE_PORT: 4000
      OSIONOS_APP_URL: ${OSIONOS_APP_URL:-https://localhost:3001}
      OSIONOS_ALLOWED_ORIGIN: ${OSIONOS_ALLOWED_ORIGIN:-https://localhost:3001}
      OSIONOS_BAAS_URL: http://kong:8000
      OSIONOS_BRIDGE_PERSISTENCE: ${OSIONOS_BRIDGE_PERSISTENCE:-auto}
      OSIONOS_BRIDGE_REQUIRE_BAAS: ${OSIONOS_BRIDGE_REQUIRE_BAAS:-false}
      CLAUDE_BIN: ${CLAUDE_BIN:-claude}
      HOME: ${OSIONOS_BRIDGE_HOME:-/tmp}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./:/app:ro
    expose:
      - "4000"
    depends_on:
      local-runtime-secrets:
        condition: service_completed_successfully
      kong:
        condition: service_healthy
      project-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/auth/bridge/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 45s
      retries: 24
    restart: unless-stopped

  osionos-app:
    image: ${OSIONOS_APP_IMAGE:-track-binocle/osionos-app:local}
    build:
      context: ./apps/osionos/app
      dockerfile: docker/services/node/Dockerfile
    working_dir: /app
    command: ["pnpm", "exec", "vite", "--host", "0.0.0.0", "--port", "3001", "--strictPort"]
    env_file:
      - ./.env.local
      - ./apps/osionos/app/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: https://localhost:4000
      VITE_REQUIRE_BRIDGE_SESSION: "true"
      VITE_ALLOW_OFFLINE_MODE: "false"
      VITE_PAGE_ACTION_SYNC_ENABLED: "true"
      VITE_PRISMATICA_URL: https://localhost:4322
      VITE_MAIL_APP_URL: https://localhost:${MAIL_HOST_PORT:-3002}
      VITE_CALENDAR_APP_URL: https://localhost:${CALENDAR_HOST_PORT:-3003}
    volumes:
      - ./apps/osionos/app:/app
      - osionos-app-node-modules:/app/node_modules
      - osionos-app-pnpm-store:/pnpm/store
    expose:
      - "3001"
    depends_on:
      osionos-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 20
    restart: unless-stopped

  mail-bridge:
    image: ${MAIL_BRIDGE_IMAGE:-track-binocle/mail-bridge:local}
    build:
      context: ./apps/mail
      target: dev
    working_dir: /app
    command: ["npm", "run", "bridge"]
    env_file:
      - path: ./apps/mail/.env
        required: false
      - path: ./apps/mail/.env.local
        required: false
    environment:
      NODE_ENV: development
      MAIL_BRIDGE_PORT: ${MAIL_BRIDGE_PORT:-4100}
      MAIL_APP_ORIGIN: https://localhost:${MAIL_HOST_PORT:-3002}
      MAIL_BRIDGE_PUBLIC_ORIGIN: https://localhost:${MAIL_BRIDGE_PORT:-4100}
      GMAIL_REDIRECT_URI: https://localhost:${MAIL_BRIDGE_PORT:-4100}/auth/gmail/callback
      VAULT_ADDR: ${MAIL_BRIDGE_VAULT_ADDR:-http://vault:8200}
    volumes:
      - ./apps/mail:/app
      - mail-node-modules:/app/node_modules
    expose:
      - "4100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const port=process.env.MAIL_BRIDGE_PORT||4100; fetch('http://127.0.0.1:'+port+'/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 12
    restart: unless-stopped

  mail:
    image: ${MAIL_IMAGE:-track-binocle/mail:local}
    build:
      context: ./apps/mail
      target: dev
    working_dir: /app
    command: ["npm", "run", "dev"]
    env_file:
      - path: ./apps/mail/.env
        required: false
      - path: ./apps/mail/.env.local
        required: false
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_MAIL_BRIDGE_URL: https://localhost:${MAIL_BRIDGE_PORT:-4100}
    volumes:
      - ./apps/mail:/app
      - mail-node-modules:/app/node_modules
    expose:
      - "3002"
    depends_on:
      mail-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 20
    restart: unless-stopped

  calendar-bridge:
    image: ${CALENDAR_BRIDGE_IMAGE:-track-binocle/calendar-bridge:local}
    build:
      context: ./apps/calendar
      target: dev
    working_dir: /app
    command: ["npm", "run", "bridge"]
    env_file:
      - path: ./apps/calendar/.env
        required: false
      - path: ./apps/mail/.env
        required: false
      - path: ./.env.local
        required: false
      - path: ./apps/calendar/.env.local
        required: false
      - path: ./apps/baas/.env.local
        required: false
    environment:
      NODE_ENV: development
      CALENDAR_BRIDGE_PORT: ${CALENDAR_BRIDGE_PORT:-4200}
      CALENDAR_APP_ORIGIN: https://localhost:${CALENDAR_HOST_PORT:-3003}
      CALENDAR_BRIDGE_PUBLIC_ORIGIN: https://localhost:${CALENDAR_BRIDGE_PORT:-4200}
      CALENDAR_REDIRECT_URI: https://localhost:${CALENDAR_BRIDGE_PORT:-4200}/auth/google/callback
      CALENDAR_BAAS_URL: http://kong:8000
      CALENDAR_BAAS_PUBLIC_URL: https://localhost:${KONG_HTTP_PORT:-8000}
      VAULT_ADDR: ${CALENDAR_BRIDGE_VAULT_ADDR:-http://vault:8200}
    volumes:
      - ./apps/calendar:/app
      - calendar-node-modules:/app/node_modules
    expose:
      - "4200"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kong:
        condition: service_healthy
      project-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const port=process.env.CALENDAR_BRIDGE_PORT||4200; fetch('http://127.0.0.1:'+port+'/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 12
    restart: unless-stopped

  calendar:
    image: ${CALENDAR_IMAGE:-track-binocle/calendar:local}
    build:
      context: ./apps/calendar
      target: dev
    working_dir: /app
    command: ["npm", "run", "dev"]
    env_file:
      - path: ./apps/calendar/.env
        required: false
      - path: ./apps/calendar/.env.local
        required: false
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_CALENDAR_BRIDGE_URL: https://localhost:${CALENDAR_BRIDGE_PORT:-4200}
      VITE_CALENDAR_BAAS_URL: https://localhost:${KONG_HTTP_PORT:-8000}
    volumes:
      - ./apps/calendar:/app
      - calendar-node-modules:/app/node_modules
    expose:
      - "3003"
    depends_on:
      calendar-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3003').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 20
    restart: unless-stopped

  opposite-osiris-deps:
    image: ${OPPOSITE_OSIRIS_DEPS_IMAGE:-track-binocle/opposite-osiris-deps:local}
    build:
      context: .
      dockerfile: apps/opposite-osiris/docker/services/node/Dockerfile
    working_dir: /workspace/apps/opposite-osiris
    command: ["true"]
    volumes:
      - ./:/workspace
      - opposite-osiris-node-modules:/workspace/apps/opposite-osiris/node_modules
      - mini-baas-sdk-node-modules:/workspace/apps/baas/sdk/node_modules
    restart: "no"

  auth-gateway:
    image: ${AUTH_GATEWAY_IMAGE:-track-binocle/auth-gateway:local}
    build:
      context: .
      dockerfile: apps/opposite-osiris/docker/services/node/Dockerfile
    working_dir: /workspace/apps/opposite-osiris
    command: ["node", "scripts/auth-gateway.mjs"]
    env_file:
      - ./.env.local
      - ./apps/baas/.env.local
      - ./apps/opposite-osiris/.env.local
    environment:
      AUTH_GATEWAY_PORT: 8787
      PUBLIC_BAAS_URL: http://kong:8000
      OSIONOS_BRIDGE_URL: http://osionos-bridge:4000/api/auth/bridge/session
      PUBLIC_SITE_URL: https://localhost:${OPPOSITE_OSIRIS_HOST_PORT:-4322}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
      PUBLIC_AUTH_REQUIRE_EMAIL_VERIFICATION: ${PUBLIC_AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
    volumes:
      - ./:/workspace
      - opposite-osiris-node-modules:/workspace/apps/opposite-osiris/node_modules
      - mini-baas-sdk-node-modules:/workspace/apps/baas/sdk/node_modules
    expose:
      - "8787"
    depends_on:
      local-runtime-secrets:
        condition: service_completed_successfully
      kong:
        condition: service_healthy
      project-db-init:
        condition: service_completed_successfully
      opposite-osiris-deps:
        condition: service_completed_successfully
      osionos-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/api/auth/availability').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 12
    restart: unless-stopped

  opposite-osiris:
    image: ${OPPOSITE_OSIRIS_IMAGE:-track-binocle/opposite-osiris:local}
    build:
      context: .
      dockerfile: apps/opposite-osiris/docker/services/node/Dockerfile
    working_dir: /workspace/apps/opposite-osiris
    command: ["node", "scripts/container-only.mjs", "astro", "dev", "--host", "0.0.0.0", "--port", "4322"]
    env_file:
      - ./.env.local
      - ./apps/baas/.env.local
      - ./apps/opposite-osiris/.env.local
    environment:
      ASTRO_DEV_HOST: 0.0.0.0
      ASTRO_DEV_PORT: 4322
      ASTRO_DEV_HTTPS: "false"
      PUBLIC_SITE_URL: https://localhost:${OPPOSITE_OSIRIS_HOST_PORT:-4322}
      PUBLIC_BAAS_URL: /api
      PUBLIC_AUTH_GATEWAY_URL: /api/auth
      PUBLIC_OSIONOS_APP_URL: https://localhost:${OSIONOS_APP_HOST_PORT:-3001}
      PUBLIC_AUTH_REQUIRE_EMAIL_VERIFICATION: ${PUBLIC_AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
      AUTH_GATEWAY_TARGET: http://auth-gateway:8787
      BAAS_GATEWAY_TARGET: http://kong:8000
      TURNSTILE_BYPASS_LOCAL: "true"
    volumes:
      - ./:/workspace
      - opposite-osiris-node-modules:/workspace/apps/opposite-osiris/node_modules
      - mini-baas-sdk-node-modules:/workspace/apps/baas/sdk/node_modules
    expose:
      - "4322"
    depends_on:
      auth-gateway:
        condition: service_healthy
      opposite-osiris-deps:
        condition: service_completed_successfully
      kong:
        condition: service_healthy
      osionos-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4322').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 20
    restart: unless-stopped

  playground-simulation:
    profiles:
      - testing
    image: ${PLAYGROUND_SIMULATION_IMAGE:-track-binocle/playground-simulation:local}
    build:
      context: ./apps/osionos/app
      dockerfile: docker/services/browser-tests/Dockerfile
    working_dir: /app
    init: true
    ipc: host
    network_mode: host
    environment:
      CI: "1"
      NODE_ENV: test
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PLAYGROUND_WEBSITE_URL: https://127.0.0.1:4322
      PLAYGROUND_APP_URL: https://127.0.0.1:3001
      PLAYGROUND_BRIDGE_URL: https://127.0.0.1:4000
      PLAYGROUND_MAIL_URL: https://127.0.0.1:3002
      PLAYGROUND_MAIL_BRIDGE_URL: https://127.0.0.1:4100
      PLAYGROUND_CALENDAR_URL: https://127.0.0.1:3003
      PLAYGROUND_CALENDAR_BRIDGE_URL: https://127.0.0.1:4200
      NODE_EXTRA_CA_CERTS: /certs/track-binocle-local-ca.pem
      PLAYGROUND_VIEWER_DIR: /app/public/playground-simulation
      PLAYGROUND_HEADLESS: ${PLAYGROUND_HEADLESS:-1}
      PLAYGROUND_SLOWMO_MS: ${PLAYGROUND_SLOWMO_MS:-80}
    volumes:
      - ./apps/osionos/app:/app
      - ./apps/baas/certs:/certs:ro
      - osionos-browser-test-node-modules:/app/node_modules
      - osionos-browser-test-pnpm-store:/pnpm/store
    entrypoint: ["/bin/bash", "/app/docker/services/browser-tests/entrypoint.sh"]
    command: ["node", "scripts/playground-simulation.mjs"]

volumes:
  track-binocle-vault-data:
  track-binocle-postgres-data:
  track-binocle-redis-data:
  osionos-app-node-modules:
  osionos-app-pnpm-store:
  mail-node-modules:
  calendar-node-modules:
  osionos-browser-test-node-modules:
  osionos-browser-test-pnpm-store:
  mini-baas-sdk-node-modules:
  opposite-osiris-node-modules:
