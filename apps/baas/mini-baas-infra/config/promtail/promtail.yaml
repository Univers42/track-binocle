# Promtail configuration — ships Docker container logs to Loki
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker Service Discovery ──────────────────────────────────────────────
  # Auto-discovers containers and populates labels from Docker metadata,
  # including compose_service and compose_project for per-service filtering.
  - job_name: docker-sd
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=mini-baas"]
    relabel_configs:
      # Map container name to a label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container_name
      # Map compose service name
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
      # Map compose project name
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
      # Map container ID for deduplication
      - source_labels: ["__meta_docker_container_id"]
        target_label: container_id
    pipeline_stages:
      - docker: {}
      # Try to parse JSON-structured logs (pino / NestJS)
      - json:
          expressions:
            stream: stream
            time: time
            level: level
            service: service
            msg: msg
      - labels:
          stream:
          level:
          service:
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - UnixMs

  # ── Fallback: plain Docker JSON logs (containers not discovered above) ────
  - job_name: docker-fallback
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            stream: stream
            time: time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
