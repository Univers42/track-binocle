# Prometheus scrape configuration for mini-BaaS
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "kong"
    static_configs:
      - targets: ["kong:8001"]
    metrics_path: /metrics

  - job_name: "mongo-api"
    static_configs:
      - targets: ["mongo-api:3010"]
    metrics_path: /metrics

  # adapter-registry and query-router no longer expose /metrics;
  # HTTP metrics are now collected by Kong's prometheus plugin.

  - job_name: "permission-engine"
    static_configs:
      - targets: ["permission-engine:3050"]
    metrics_path: /metrics

  - job_name: "schema-service"
    static_configs:
      - targets: ["schema-service:3060"]
    metrics_path: /metrics

  - job_name: "vault"
    metrics_path: /v1/sys/metrics
    params:
      format: ["prometheus"]
    scheme: http
    static_configs:
      - targets: ["vault:8200"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres:5432"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
