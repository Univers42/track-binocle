# File: docker/services/waf/conf/nginx.conf
# Nginx reverse-proxy to Kong with ModSecurity enabled.
# This is the ONLY public-facing listener; Kong's :8000 becomes internal.

server {
    listen 80;
    server_name _;

    # ── ModSecurity engine ─────────────────────────────────────────
    # ModSecurity is enabled globally by CRS via conf.d/modsecurity.conf.
    # No need to duplicate modsecurity_rules_file here.

    # ── WAF health endpoint (bypasses ModSecurity) ─────────────────
    location = /waf-health {
        modsecurity off;
        access_log off;
        return 200 '{"status":"ok","service":"waf"}';
        add_header Content-Type application/json;
    }

    # ── Proxy everything to Kong ───────────────────────────────────
    location / {
        proxy_pass         http://kong:8000;
        proxy_http_version 1.1;

        # Preserve original client information
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Realtime)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer tuning
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
        proxy_busy_buffers_size 64k;

        # Pass body for POST/PUT (needed for API requests)
        client_max_body_size 10m;
    }
}

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
