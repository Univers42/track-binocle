# File: docker/services/waf/conf/modsecurity.conf
# ModSecurity v3 — hardened configuration for mini-BaaS
# Overrides the defaults from the owasp/modsecurity-crs image.

# ── Engine mode ────────────────────────────────────────────────────
# "On"            = block requests that match rules (production)
# "DetectionOnly" = log only, never block (debugging)
SecRuleEngine On

# ── Request body inspection ────────────────────────────────────────
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# ── Response body inspection ───────────────────────────────────────
SecResponseBodyAccess Off

# ── Audit logging ──────────────────────────────────────────────────
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/modsec_audit.log
SecAuditLogParts ABCFHZ

# ── Debug logging (off in production) ──────────────────────────────
SecDebugLogLevel 0

# ── Temporary and data directories ─────────────────────────────────
SecTmpDir  /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data

# ── Anomaly scoring thresholds ─────────────────────────────────────
# CRS v4 default:  inbound=5, outbound=4
# We keep same thresholds — adjust via crs-setup.conf below.

# ── Unicode map ────────────────────────────────────────────────────
SecUnicodeMapFile /etc/modsecurity.d/unicode.mapping 20127

# ── Content types to inspect ───────────────────────────────────────
# XML/JSON body processor rules (200000/200001) are already included by CRS.

# ── Custom exclusions for mini-BaaS ───────────────────────────────
# Allow Kong admin health endpoint without WAF inspection
SecRule REQUEST_URI "^/waf-health$" \
    "id:300001,phase:1,pass,nolog,ctl:ruleEngine=Off"

# Allow JSON bodies with special characters (common in BaaS payloads)
SecRule REQUEST_URI "^/(rest|mongo|query|admin|email|schemas|permissions)/v1/" \
    "id:300002,phase:1,pass,nolog,ctl:requestBodyProcessor=JSON"

# Relax SQL injection rules for PostgREST filter syntax (?column=eq.value)
SecRule REQUEST_URI "^/rest/v1/" \
    "id:300010,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetById=942100;ARGS,\
     ctl:ruleRemoveTargetById=942120;ARGS,\
     ctl:ruleRemoveTargetById=942130;ARGS,\
     ctl:ruleRemoveTargetById=942150;ARGS,\
     ctl:ruleRemoveTargetById=942180;ARGS,\
     ctl:ruleRemoveTargetById=942200;ARGS,\
     ctl:ruleRemoveTargetById=942260;ARGS,\
     ctl:ruleRemoveTargetById=942340;ARGS,\
     ctl:ruleRemoveTargetById=942370;ARGS,\
     ctl:ruleRemoveTargetById=942432;ARGS"

# Relax false positives on auth routes (Bearer tokens look like base64 attacks)
SecRule REQUEST_URI "^/auth/v1/" \
    "id:300020,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetById=942100;REQUEST_HEADERS:authorization,\
     ctl:ruleRemoveTargetById=942440;REQUEST_HEADERS:authorization,\
     ctl:ruleRemoveTargetById=942450;REQUEST_HEADERS:authorization"

# Relax content-type rules on file upload routes
SecRule REQUEST_URI "^/storage/v1/" \
    "id:300030,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920420"
