# File: docker/services/redis/conf/redis.conf
# Description: Redis server configuration
# See: https://redis.io/docs/management/config/

# Memory limit
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence – AOF
appendonly yes
appendfsync everysec

# Persistence – RDB snapshot (every 60s if ≥1000 keys changed)
save 60 1000

# Networking
bind 0.0.0.0
protected-mode no
