<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="prism-g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="prism-g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Outer prism -->
  <polygon points="50,8 88,72 12,72" stroke="url(#prism-g1)" stroke-width="3" fill="none" stroke-linejoin="round"/>
  <!-- Inner prism -->
  <polygon points="50,24 74,64 26,64" stroke="url(#prism-g2)" stroke-width="2" fill="rgba(124,58,237,0.08)" stroke-linejoin="round"/>
  <!-- Light refraction lines -->
  <line x1="50" y1="24" x2="35" y2="84" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="24" x2="50" y2="88" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="24" x2="65" y2="84" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="50" cy="48" r="3" fill="url(#prism-g1)"/>
</svg>
